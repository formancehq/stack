workflowVersion: 1.0.0
speakeasyVersion: latest
sources:
    stacks-source:
        inputs:
            - location: ./components/auth.openapi.yaml
              modelNamespace: auth
            - location: ./components/gateway.openapi.yaml
              modelNamespace: gateway
            - location: ./components/ledger.openapi.yaml
              modelNamespace: ledger
            - location: ./components/payments.openapi.yaml
              modelNamespace: payments
            - location: ./components/search.openapi.yaml
              modelNamespace: search
            - location: ./components/webhooks.openapi.yaml
              modelNamespace: webhooks
            - location: ./components/wallets.openapi.yaml
              modelNamespace: wallets
            - location: ./components/orchestration.openapi.yaml
              modelNamespace: orchestration
            - location: ./components/reconciliation.openapi.yaml
              modelNamespace: reconciliation
            - location: ./releases/base.yaml
        overlays:
            - location: ./releases/overlays/shared.overlay.yaml
        output: ./releases/build/generate.json
        registry:
            location: registry.speakeasyapi.dev/formance/formance/stacks-source
targets:
    csharp-sdk:
        target: csharp
        source: stacks-source
        output: ./sdks/csharp
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/formance/formance/stacks-source-csharp-code-samples
            labelOverride:
                fixedValue: Csharp (SDK)
            blocking: false
    go-sdk:
        target: go
        source: stacks-source
        output: ./sdks/go
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/formance/formance/stacks-source-go-code-samples
            labelOverride:
                fixedValue: Go (SDK)
            blocking: false
    java-sdk:
        target: java
        source: stacks-source
        output: ./sdks/java
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/formance/formance/stacks-source-java-code-samples
            labelOverride:
                fixedValue: Java (SDK)
            blocking: false
    php-sdk:
        target: php
        source: stacks-source
        output: ./sdks/php
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/formance/formance/stacks-source-php-code-samples
            labelOverride:
                fixedValue: Php (SDK)
            blocking: false
    python-sdk:
        target: python
        source: stacks-source
        output: ./sdks/python
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/formance/formance/stacks-source-python-code-samples
            labelOverride:
                fixedValue: Python (SDK)
            blocking: false
    typescript-sdk:
        target: typescript
        source: stacks-source
        output: ./sdks/typescript
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/formance/formance/stacks-source-typescript-code-samples
            labelOverride:
                fixedValue: Typescript (SDK)
            blocking: false
