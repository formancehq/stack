overlay: 1.0.0
info:
  title: Shared overlay for Formance Stack OpenAPI spec
  version: 0.0.1
actions:
  # Remove the NoAuthorization securityScheme definition (injected by component merge)
  - target: $.components.securitySchemes.NoAuthorization
    remove: true

  # Remove existing security on GET /versions and replace with empty requirement
  - target: $.paths['/versions'].get.security
    remove: true
  - target: $.paths['/versions'].get
    update:
      security:
        - {}

  # Fix ledger_V2QueryParams.sort: replace $ref with inline definition
  - target: $.components.schemas.ledger_V2QueryParams.properties.sort
    update:
      type: string
      description: |
        Sort results using a field name and order (ascending or descending).
        Format: `<field>:<order>`, where `<field>` is the field name and `<order>` is either `asc` or `desc`.
      example: "id:desc"
  - target: $.components.schemas.ledger_V2QueryParams.properties.sort.$ref
    remove: true

  # Speakeasy error handling
  - target: $.paths
    update:
      x-speakeasy-errors:
        statusCodes:
          - default
