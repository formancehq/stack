openapi: 3.0.3
info:
  title: Webhooks
  version: "WEBHOOKS_VERSION"

paths: 
  /v2/hooks:
    get:
      summary: Get Many hooks
      description: List of Available hooks
      operationId: getManyHooks 
      tags:
        - Webhooks 
      parameters:
        - name: endpoint
          in: query
          description: Optional filter by endpoint URL
          required: false
          schema:
            type: string
            example: https://example.com 
        - name: cursor 
          in: query
          description: optional cursor filter for pagination
          required: false 
          schema:
            type: string
      responses:
        "200":
          description: OK 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2HookCursorResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Insert new Hook
      description: |
          Insert a new webhooks config.

          The endpoint should be a valid https URL and be unique.

          The secret is the endpoint's verification secret.
          If not passed or empty, a secret is automatically generated.
          The format is a random string of bytes of size 24, base64 encoded. (larger size after encoding)

          All eventTypes are converted to lower-case when inserted.
      operationId: insertConfig
      tags: 
        - Webhooks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/V2HookBodyParams'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2HookResponse'
  /v2/hooks/{hookId}:
    delete:
      summary: Delete one Hook
      operationId: deleteHook
      parameters:
          - name: hookId
            in: path
            description: Hook ID
            required: true
            schema:
              type: string
              example: 4997257d-dfb6-445b-929c-cbe2ab182818
      responses:
        "200":
          content:
              application/json:
                schema:
                  $ref: '#/components/schemas/V2HookResponse'
          description: The hooks successfully deleted
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/hooks/{hookId}/test:
    post:
      summary: Test one Hook
      operationId: testHook
      tags: 
        - Webhooks
      parameters:
        - name: hookId
          in: path
          description: Hook ID
          required: true
          schema:
            type: string
            example: 4997257d-dfb6-445b-929c-cbe2ab182818    
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2AttemptResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/hooks/{hookId}/activate:
    put:
      summary: Activate one Hook
      operationId: activateHook
      tags: 
        - Webhooks
      parameters:
        - name: hookId
          in: path
          description: Hook ID
          required: true
          schema:
            type: string
            example: 4997257d-dfb6-445b-929c-cbe2ab182818 
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2HookResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/hooks/{hookId}/deactivate:
    put:
      summary: Deactivate one Hook
      operationId: deactivateHook
      tags: 
        - Webhooks
      parameters:
        - name: hookId
          in: path
          description: Hook ID
          required: true
          schema:
            type: string
            example: 4997257d-dfb6-445b-929c-cbe2ab182818 
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2HookResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/hooks/{hookId}/secret:
    put:
      summary: Change the secret of one Hook
      operationId: updateSecretHook
      tags: 
        - Webhooks
      parameters:
        - name: hookId
          in: path
          description: Hook ID
          required: true
          schema:
            type: string
            example: 4997257d-dfb6-445b-929c-cbe2ab182818 
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                secret:
                  type: string
                  default: ""
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2HookResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/hooks/{hookId}/endpoint:
    put:
      summary: Change the endpointt of one Hook
      operationId: updateEndpointHook
      tags: 
        - Webhooks
      parameters:
        - name: hookId
          in: path
          description: Hook ID
          required: true
          schema:
            type: string
            example: 4997257d-dfb6-445b-929c-cbe2ab182818 
      requestBody:
        content:
          application/json:
            schema:
              type: object 
              properties:
                endpoint:
                  type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2HookResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/hooks/{hookId}/retry:
    put:
      summary: Change the retry attribute of one Hook
      operationId: updateSecretHook
      tags: 
        - Webhooks
      parameters:
        - name: hookId
          in: path
          description: Hook ID
          required: true
          schema:
            type: string
            example: 4997257d-dfb6-445b-929c-cbe2ab182818 
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                retry:
                  type: boolean       
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2HookResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'          
  /v2/attempts/waiting:
    get:
      summary: Get Waiting Attempts
      description: List of Available hooks
      operationId: getWaitingAttempts
      tags:
        - Webhooks 
      parameters:
        - name: cursor 
          in: query
          description: optional cursor filter for pagination
          required: false 
          schema:
            type: string
      responses:
        "200":
          description: OK 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2AttemptCursorResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/attempts/aborted:
    get:
      summary: Get aborted Attempts
      operationId: getAbortedAttempts
      tags:
          - Webhooks 
      parameters:
        - name: cursor 
          in: query
          description: optional cursor filter for pagination
          required: false 
          schema:
            type: string
      responses:
        "200":
          description: OK 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2AttemptCursorResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/attempts/waiting/flush:
    put:
      summary: Retry all the waiting attempts
      operationId: retryWaitingAttempts
      tags:
        - Webhooks 
      responses:
        "200":
          description: OK 
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/attempts/waiting/{attemptId}/flush:
    put:
      summary: Retry one waiting Attempt
      operationId: retryWaitingAttempt
      tags:
          - Webhooks 
      parameters:
        - name: attemptId
          in: path
          description: Attempt ID
          required: true
          schema:
            type: string
            example: 4997257d-dfb6-445b-929c-cbe2ab182818 
      responses:
        "200":
          description: OK 
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v2/attempts/waiting/{attemptId}/abort:
    put:
      summary: Abort one waiting attempt
      operationId: retryWaitingAttempt
      tags:
          - Webhooks 
      parameters:
        - name: attemptId
          in: path
          description: Attempt ID
          required: true
          schema:
            type: string
            example: 4997257d-dfb6-445b-929c-cbe2ab182818 
      responses:
        "200":
          description: OK 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2AttemptResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    V2Cursor:
      type: object
      required:
        - pageSize
        - hasMore
        - previous
        - next 
        - data 
      properties:
        pageSize:
          type: integer
        hasMore:
          type: boolean
        previous:
          type: string 
        next :
          type: string 
        data: 
          type: array
          items: 
            type: object
    V2BaseResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
    V2HookCursorResponse:
      type: object 
      required:
        - cursor
      properties:
        cursor:
          $ref: '#/components/schemas/V2Cursor'
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/V2Hook'
    V2AttemptCursorResponse:
      type: object 
      required:
        - cursor
      properties:
          cursor:
            $ref: '#/components/schemas/V2Cursor'
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/V2Attempt'
    V2HookResponse:
      allOf:
        - $ref: '#/components/schemas/V2BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/V2Hook'
    V2AttemptResponse:
      allOf:
        - $ref: '#/components/schemas/V2BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/V2Attempt'
    V2Hook:
      type: object
      required:
        - id
        - name 
        - status
        - events 
        - endpoint
        - secret 
        - retry
        - dateCreation
        - dateStatus
      properties:
        id:
          type: string 
          format: uuid 
        name: 
          type: string 
        status:
          type: string
        events:
          type: array
          items:
            type: string
        endpoint:
          type: string 
        secret: 
          type: string 
        retry:
          type: boolean 
        dateCreation:
          type: string
          format: date-time
        dateStatus:
          type: string
          format: date-time
    V2Attempt:
      type: object
      required:
        - id
        - hookId
        - hookName
        - hookEndpoint
        - event
        - payload
        - statusCode
        - dateOccured
        - status
        - dateStatus
        - comment
        - nextRetryAfter
      properties:
        id:
          type: string
          format: uuid
        hookId:
          type: string
          format: uuid
        hookName:
          type: string 
        hookEndpoint:
          type: string
        event:
          type: string 
        payload:
          type: string 
        statusCode:
          type: integer
        dateOccured:
          type: string 
          format: date-time
        status:
          type: string 
        dateStatus:
          type: string
          format: date-time 
        comment:
          type: string 
        nextRetryAfter:
          type: string
          format: date-time 
    V2HookBodyParams:
      type: object
      required:
        - endpoint
        - events
      properties:
        name:
          type: string
        endpoint:
          type: string 
        secret:
          type: string 
        events: 
          type: array
          items:
            type: string
        retry:
          type: boolean 
        
        